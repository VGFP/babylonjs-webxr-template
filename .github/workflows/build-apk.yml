name: Build Meta Quest APK

on:
  workflow_run:
    workflows: ["Deploy to Pages"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pages_url:
        description: "GitHub Pages base URL (e.g. https://user.github.io/repo)"
        required: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set Pages URL
        id: pages
        run: |
          if [ -n "${{ github.event.inputs.pages_url }}" ]; then
            echo "url=${{ github.event.inputs.pages_url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.PAGES_URL }}" ]; then
            echo "url=${{ secrets.PAGES_URL }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://vgfp.github.io/babylonjs-webxr-template/" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Meta Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Pre-seed Bubblewrap config
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' \
            "$JAVA_HOME" "$ANDROID_SDK_ROOT" \
            > "$HOME/.bubblewrap/config.json"

      - name: Resolve signing keys
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
        run: |
          KEYSTORE_PATH="$HOME/android.keystore"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "::notice::Using production keystore from secrets."
            echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            echo "keystore_path=$KEYSTORE_PATH" >> $GITHUB_OUTPUT
            echo "key_alias=$KEY_ALIAS"         >> $GITHUB_OUTPUT
            echo "signing_mode=production"      >> $GITHUB_OUTPUT
          else
            echo "::warning::No keystore secrets found — generating a debug keystore."
            DEBUG_ALIAS="androiddebugkey"
            DEBUG_PASSWORD="android"
            keytool -genkeypair \
              -keystore  "$KEYSTORE_PATH" \
              -alias     "$DEBUG_ALIAS" \
              -keyalg    RSA \
              -keysize   2048 \
              -validity  10000 \
              -storepass "$DEBUG_PASSWORD" \
              -keypass   "$DEBUG_PASSWORD" \
              -dname     "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" \
              -noprompt
            echo "keystore_path=$KEYSTORE_PATH" >> $GITHUB_OUTPUT
            echo "key_alias=$DEBUG_ALIAS"       >> $GITHUB_OUTPUT
            echo "signing_mode=debug"           >> $GITHUB_OUTPUT
          fi

      - name: Create build directory
        run: mkdir -p /tmp/pwa-build

      - name: Initialize Bubblewrap project
        working-directory: /tmp/pwa-build
        run: |
          if [ -f "$GITHUB_WORKSPACE/twa-manifest.json" ]; then
            echo "::notice::Found committed twa-manifest.json — running bubblewrap update."
            cp "$GITHUB_WORKSPACE/twa-manifest.json" .
            bubblewrap update
          else
            echo "::notice::No twa-manifest.json found — running bubblewrap init."
            bubblewrap init \
              --manifest="https://raw.githubusercontent.com/VGFP/babylonjs-webxr-template/refs/heads/feat/generate-apk-ci/public/manifest.webmanifest?token=GHSAT0AAAAAAD4IN4FTZ72JWLLXGH2N67S22QQZDUQ" \
              --directory=. \
              --metaquest \
              --signingKeyPath="${{ steps.signing.outputs.keystore_path }}" \
              --signingKeyAlias="${{ steps.signing.outputs.key_alias }}" \
              --skipPwaValidation \
              --appName="BabylonJS WebXR" \
              --appVersionName="1.0.0" \
              --appVersionCode="1" \
              --backgroundColor="#000000" \
              --themeColor="#4B0082" \
              --navigationColor="#000000" \
              --navigationColorDark="#000000" \
              --navigationDividerColor="#000000" \
              --navigationDividerColorDark="#000000" \
              --enableNotifications=false \
              --startUrl="/" \
              --splashScreenFadeOutDuration=0
            cp twa-manifest.json "$GITHUB_WORKSPACE/twa-manifest.json"
          fi

      - name: Upload twa-manifest.json artifact (first run only)
        if: ${{ !hashFiles('**/twa-manifest.json') }}
        uses: actions/upload-artifact@v4
        with:
          name: twa-manifest
          path: ${{ github.workspace }}/twa-manifest.json

      - name: Build APK
        working-directory: /tmp/pwa-build
        env:
          STORE_PW: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PW:   ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath="${{ steps.signing.outputs.keystore_path }}" \
            --signingKeyAlias="${{ steps.signing.outputs.key_alias }}" \
            --signingKeyPassword="${KEY_PW:-android}" \
            --signingStorePassword="${STORE_PW:-android}"

      - name: Annotate signing mode
        run: |
          if [ "${{ steps.signing.outputs.signing_mode }}" = "debug" ]; then
            echo "::warning::APK is DEBUG-SIGNED. Do not submit to the Meta Horizon Store."
          else
            echo "::notice::APK is PRODUCTION-SIGNED."
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-quest-apk-${{ steps.signing.outputs.signing_mode }}
          path: /tmp/pwa-build/app-release-signed.apk
          retention-days: 30