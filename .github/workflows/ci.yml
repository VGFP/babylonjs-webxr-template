name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start static server
        run: npx -y serve dist -l 8080 &

      - name: Wait for server
        run: npx -y wait-on http://localhost:8080/manifest.webmanifest

      - name: Install Meta's Bubblewrap fork
        run: |
          git clone https://github.com/meta-quest/bubblewrap /tmp/bubblewrap-repo
          cd /tmp/bubblewrap-repo/bubblewrap
          npm install && npm run build

      - name: Reinitialize TWA manifest with --metaquest
        run: |
          node /tmp/bubblewrap-repo/bubblewrap/packages/cli/bin/bubblewrap.js init \
            --manifest=http://localhost:8080/manifest.webmanifest \
            --metaquest

      - name: Generate debug keystore
        run: |
          keytool -genkey -noprompt \
            -keystore android.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname 'CN=Android Debug,O=Android,C=US'

      - name: Build and sign APK with Bubblewrap
        run: |
          (sleep 5; echo y; sleep 3; echo y; sleep 3; echo n; sleep 3; echo y) | \
            node /tmp/bubblewrap-repo/bubblewrap/packages/cli/bin/bubblewrap.js build \
              --manifest twa-manifest.json \
              --skipPwaValidation \
              --ks android.keystore \
              --ksAlias androiddebugkey \
              --ksKeyPass android \
              --ksPass android

      - uses: actions/upload-artifact@v4
        with:
          name: apk-signed
          path: app-release-signed.apk
