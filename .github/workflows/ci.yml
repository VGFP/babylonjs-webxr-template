name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start static server
        run: npx -y serve dist -l 8080 &

      - name: Wait for server
        run: npx -y wait-on http://localhost:8080/manifest.webmanifest

      - name: Build APK with Bubblewrap
        run: |
          docker run --rm \
            --network host \
            --entrypoint sh \
            -v "$PWD:/app" \
            -w /app \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            -c "bubblewrap doctor; (sleep 5; echo y; sleep 10; echo y) | bubblewrap build --manifest twa-manifest.json --skipSigning --skipPwaValidation"

      - uses: actions/upload-artifact@v4
        with:
          name: apk-unsigned
          path: app-release-unsigned.apk
